workflows:
  android-build:
    name: Android APK Build (PharmaPOS Pro)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials # For release signing if configured
      flutter: 3.22.0
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Retrieve dependencies
        script: |
          flutter pub get
      - name: Run Flutter lint and static analysis
        script: |
          flutter analyze
      - name: Build Android APK (Release)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - justher.lifestyle@gmail.com
        notify:
          success: true
          failure: true
