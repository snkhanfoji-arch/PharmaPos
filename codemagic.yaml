workflows:
  android-build:
    name: Android APK Build - PharmaPOS Pro
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Flutter clean
        script: |
          flutter clean
      
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Build Android APK Release
        script: |
          flutter build apk --release --no-tree-shake-icons --no-shrink --target-platform android-arm64,android-arm,android-x64
      
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/flutter-apk/*.apk
    
    publishing:
      email:
        recipients:
          - justher.lifestyle@gmail.com
        notify:
          success: true
          failure: true
