name: pharma_pos_pro
description: A complete offline Pharmacy POS application with inventory, billing, PDF invoicing, custom settings, and database backup.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.1
  file_picker: ^6.2.1
  pdf: ^3.10.8
  printing: ^5.11.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
